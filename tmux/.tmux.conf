set -g mouse on

# 清掉 VS Code shell integration 注入 PROMPT_COMMAND 的 __vsc_prompt_cmd_original
# 引用——该函数只活在 VS Code 直连的 shell 进程里，tmux 新窗口的 shell 继承了
# PROMPT_COMMAND 却拿不到函数定义，会报 "command not found"。
set-environment -gu PROMPT_COMMAND
set-hook -g session-created 'run-shell "tmux setenv -gu PROMPT_COMMAND"'

set -s command-alias[100] 'ns=new-session -s'
set -s command-alias[101] 'as=attach-session -t'
set -s command-alias[102] 'ks=kill-session -t'
set -s command-alias[103] 'rs=rename-session -t'
